services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-sidclaw}
      POSTGRES_USER: ${DB_USER:-sidclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sidclaw}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-sidclaw}:${DB_PASSWORD}@db:5432/${DB_NAME:-sidclaw}
      NODE_ENV: production
      PORT: 4000
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.sidclaw.com}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-SidClaw <notifications@sidclaw.com>}
      DASHBOARD_URL: ${DASHBOARD_URL:-https://app.sidclaw.com}
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "${API_PORT:-4000}:4000"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.sidclaw.com}
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    restart: unless-stopped

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    ports:
      - "${DOCS_PORT:-3001}:3001"
    restart: unless-stopped

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    ports:
      - "${LANDING_PORT:-3002}:3002"
    restart: unless-stopped

volumes:
  pgdata:
