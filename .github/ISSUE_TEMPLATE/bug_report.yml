name: Bug Report
description: Report a bug in SidClaw
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - SDK (TypeScript)
        - SDK (Python)
        - API
        - Dashboard
        - Documentation
        - CLI (create-sidclaw-app)
        - MCP Proxy
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: e.g., 0.1.3
