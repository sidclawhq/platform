name: Feature Request
description: Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like SidClaw to do?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - SDK (TypeScript)
        - SDK (Python)
        - API
        - Dashboard
        - Documentation
        - CLI (create-sidclaw-app)
        - New Integration
        - Other
